# This is a Databricks asset bundle definition for DAB.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: DAB
  uuid: 1c21305c-b2a5-42d9-8637-d2d30c703e5a

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-e58a0f49-fb51.cloud.databricks.com
    variables:
      catalog: retail_rocket
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-e58a0f49-fb51.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/duybd@mz.co.kr to make sure we only have a single copy.
      root_path: /Workspace/Users/duybd@mz.co.kr/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: retail_rocket
      schema: prod
    permissions:
      - user_name: duybd@mz.co.kr
        level: CAN_MANAGE
